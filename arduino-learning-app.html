<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Breadboard — learn Arduino</title>
<style>
  :root{
    --pcb-0:#0a2e22;
    --pcb-1:#0f3b2b;
    --pcb-2:#144a36;
    --silk:#eae6d8;
    --silk-dim:#a9b8ae;
    --copper:#c17a3d;
    --copper-bright:#e0965a;
    --gold:#e0b84a;
    --trace:#1f5e44;
    --danger:#d16b5a;
    --ok:#7fbf6a;
    --panel:#0d3527;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Consolas", "Courier New", monospace;
    --sans: -apple-system, "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--pcb-0);
    color:var(--silk);
    font-family:var(--sans);
    min-height:100vh;
  }
  /* faint PCB trace background */
  body{
    background-image:
      linear-gradient(var(--trace) 1px, transparent 1px),
      linear-gradient(90deg, var(--trace) 1px, transparent 1px);
    background-size: 28px 28px;
    background-position: -1px -1px;
    background-color: var(--pcb-0);
    background-blend-mode: overlay;
    opacity:1;
  }
  .app{
    max-width:1120px;
    margin:0 auto;
    padding:20px 16px 60px;
  }

  /* ---------- header / breadboard progress strip ---------- */
  header.rack{
    background:var(--panel);
    border:1px solid #1c5b41;
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:22px;
  }
  .rack-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .brand .chip{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.08em;
    color:var(--pcb-0);
    background:var(--gold);
    padding:2px 6px;
    border-radius:3px;
    font-weight:700;
  }
  .brand h1{
    margin:0;
    font-size:20px;
    font-weight:700;
    letter-spacing:.01em;
    color:var(--silk);
  }
  .brand p{
    margin:2px 0 0;
    font-size:12.5px;
    color:var(--silk-dim);
    font-family:var(--mono);
  }
  .progress-track{
    display:flex;
    gap:8px;
  }
  .led{
    width:16px;height:16px;border-radius:50%;
    background:#1c4433;
    border:1px solid #2a6a4c;
    position:relative;
    transition:background .3s, box-shadow .3s;
  }
  .led.on{
    background:var(--gold);
    box-shadow:0 0 8px 2px rgba(224,184,74,.55);
    border-color:var(--gold);
  }
  .led-row{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .led-label{font-family:var(--mono);font-size:9.5px;color:var(--silk-dim);}

  .rail{
    height:6px;
    margin-top:14px;
    border-radius:3px;
    background:#123a2b;
    overflow:hidden;
    border:1px solid #1c5b41;
  }
  .rail-fill{
    height:100%;
    background:linear-gradient(90deg, var(--copper), var(--gold));
    width:0%;
    transition:width .4s ease;
  }

  /* ---------- layout ---------- */
  .layout{
    display:grid;
    grid-template-columns:220px 1fr;
    gap:20px;
  }
  @media (max-width:760px){
    .layout{grid-template-columns:1fr;}
  }

  nav.socket{
    background:var(--panel);
    border:1px solid #1c5b41;
    border-radius:10px;
    padding:10px;
    align-self:start;
    position:sticky;
    top:16px;
  }
  nav.socket .group-label{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.08em;
    color:var(--copper-bright);
    text-transform:uppercase;
    padding:8px 8px 4px;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    color:var(--silk);
    font-family:var(--sans);
    font-size:13.5px;
    padding:9px 8px;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:2px;
  }
  .nav-item:hover{background:#154a37;}
  .nav-item.active{background:#1c5b41; box-shadow:inset 3px 0 0 var(--gold);}
  .nav-pin{
    width:9px;height:9px;border-radius:50%;
    border:1.5px solid var(--copper);
    flex:none;
  }
  .nav-item.done .nav-pin{background:var(--gold); border-color:var(--gold);}

  main.board{
    background:var(--panel);
    border:1px solid #1c5b41;
    border-radius:10px;
    padding:26px 28px 30px;
    min-height:420px;
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--copper-bright);
    margin:0 0 6px;
  }
  h2.title{
    margin:0 0 14px;
    font-size:24px;
    color:var(--silk);
  }
  .lede{
    font-size:15px;
    line-height:1.65;
    color:#dcd8c8;
    max-width:64ch;
  }
  .lede code, p code, li code{
    font-family:var(--mono);
    background:#0d2c20;
    border:1px solid #1c5b41;
    padding:1px 5px;
    border-radius:4px;
    color:var(--gold);
    font-size:.92em;
  }

  section.block{margin-top:26px;}
  section.block h3{
    font-size:13px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--silk-dim);
    font-family:var(--mono);
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  section.block h3::before{
    content:"";
    width:6px;height:6px;
    background:var(--copper-bright);
    border-radius:1px;
    display:inline-block;
    transform:rotate(45deg);
  }

  /* wiring diagram frame */
  .diagram-frame{
    background:#08281d;
    border:1px solid #1c5b41;
    border-radius:8px;
    padding:14px;
    overflow-x:auto;
  }
  .diagram-frame svg{display:block; margin:0 auto;}

  /* code block */
  .codebox{
    background:#08281d;
    border:1px solid #1c5b41;
    border-radius:8px;
    overflow:hidden;
  }
  .codebox .cb-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:7px 12px;
    background:#0d3527;
    border-bottom:1px solid #1c5b41;
    font-family:var(--mono);
    font-size:11px;
    color:var(--silk-dim);
  }
  .codebox pre{
    margin:0;
    padding:14px 16px;
    font-family:var(--mono);
    font-size:13px;
    line-height:1.6;
    color:#cfe8d8;
    overflow-x:auto;
  }
  .tok-kw{color:#e0965a;}
  .tok-fn{color:#e0b84a;}
  .tok-num{color:#7fbf9a;}
  .tok-cm{color:#6d8577; font-style:italic;}
  .tok-str{color:#9ac97f;}

  /* quiz */
  .quiz{
    background:#08281d;
    border:1px solid #1c5b41;
    border-radius:8px;
    padding:16px 18px;
  }
  .quiz p.q{
    margin:0 0 12px;
    font-size:14.5px;
    color:var(--silk);
  }
  .quiz-opts{display:flex; flex-direction:column; gap:8px;}
  .quiz-opt{
    text-align:left;
    background:#0d3527;
    border:1px solid #1c5b41;
    color:var(--silk);
    font-family:var(--sans);
    font-size:13.5px;
    padding:9px 12px;
    border-radius:6px;
    cursor:pointer;
  }
  .quiz-opt:hover{border-color:var(--copper-bright);}
  .quiz-opt.correct{background:#173e2a; border-color:var(--ok); color:#c9edbc;}
  .quiz-opt.wrong{background:#3a1f1a; border-color:var(--danger); color:#f0c4bb;}
  .quiz-fb{
    margin-top:10px;
    font-size:13px;
    font-family:var(--mono);
    color:var(--silk-dim);
    min-height:18px;
  }

  .nav-buttons{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
    gap:10px;
  }
  .btn{
    font-family:var(--mono);
    font-size:12.5px;
    background:transparent;
    color:var(--silk);
    border:1px solid var(--copper);
    padding:9px 16px;
    border-radius:6px;
    cursor:pointer;
    letter-spacing:.03em;
  }
  .btn:hover{background:#1c5b41; border-color:var(--copper-bright);}
  .btn.primary{background:var(--copper); border-color:var(--copper); color:#0a2e22; font-weight:700;}
  .btn.primary:hover{background:var(--copper-bright);}
  .btn[disabled]{opacity:.35; cursor:not-allowed;}

  .glossary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:10px;
  }
  .comp-card{
    background:#0d3527;
    border:1px solid #1c5b41;
    border-radius:8px;
    padding:12px;
    cursor:pointer;
    min-height:96px;
  }
  .comp-card .cc-name{font-family:var(--mono); font-size:12.5px; color:var(--gold); margin-top:8px;}
  .comp-card .cc-desc{font-size:11.5px; color:var(--silk-dim); margin-top:4px; line-height:1.4; display:none;}
  .comp-card.open .cc-desc{display:block;}
</style>
</head>
<body>
<div class="app">

  <header class="rack">
    <div class="rack-top">
      <div class="brand">
        <div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="chip">UNO R3</span>
            <h1>Breadboard</h1>
          </div>
          <p>a hands-on path into Arduino electronics</p>
        </div>
      </div>
      <div class="progress-track" id="ledRow"></div>
    </div>
    <div class="rail"><div class="rail-fill" id="railFill"></div></div>
  </header>

  <div class="layout">
    <nav class="socket" id="navSocket"></nav>
    <main class="board" id="board"></main>
  </div>

</div>

<script>
/* ---------------- lesson data ---------------- */
const lessons = [
  {
    id:"breadboard",
    label:"The breadboard",
    eyebrow:"Fundamentals",
    title:"How a breadboard is wired underneath",
    lede:"A breadboard looks like a grid of holes, but it's really a small number of connected strips hidden under the plastic. Get this wrong and nothing else you build will make sense.",
    diagram: () => `
      <svg viewBox="0 0 620 220" width="600" height="220" role="img" aria-label="Breadboard connectivity diagram">
        <rect x="10" y="10" width="600" height="200" rx="6" fill="#0b3626" stroke="#1c5b41"/>
        <!-- power rails -->
        <text x="24" y="28" font-family="ui-monospace" font-size="10" fill="#d16b5a">+ power rail</text>
        <line x1="24" y1="36" x2="596" y2="36" stroke="#d16b5a" stroke-width="1.5"/>
        <text x="24" y="52" font-family="ui-monospace" font-size="10" fill="#7f9ad8">- ground rail</text>
        <line x1="24" y1="60" x2="596" y2="60" stroke="#7f9ad8" stroke-width="1.5"/>
        ${Array.from({length:16}).map((_,i)=>`<circle cx="${40+i*35}" cy="36" r="3.4" fill="#e0b84a"/>`).join("")}
        ${Array.from({length:16}).map((_,i)=>`<circle cx="${40+i*35}" cy="60" r="3.4" fill="#9fb6e6"/>`).join("")}

        <!-- main grid: each vertical group of 5 is one connected strip -->
        <text x="24" y="92" font-family="ui-monospace" font-size="10" fill="#a9b8ae">terminal strips (each column of 5 = one node)</text>
        ${Array.from({length:12}).map((_,col)=>{
          const x = 40 + col*46;
          return `<rect x="${x-8}" y="100" width="16" height="90" rx="3" fill="${col%2===0?'#0f3b2b':'#123a2b'}" stroke="#1c5b41" stroke-width="0.5"/>` +
          Array.from({length:5}).map((_,row)=>`<circle cx="${x}" cy="${112+row*17}" r="3.2" fill="#cfe8d8"/>`).join("");
        }).join("")}
        <line x1="330" y1="100" x2="330" y2="190" stroke="#08281d" stroke-width="6"/>
        <text x="317" y="205" font-family="ui-monospace" font-size="9" fill="#a9b8ae">center gap</text>

        <!-- highlight one strip -->
        <rect x="132" y="100" width="16" height="90" rx="3" fill="none" stroke="#e0b84a" stroke-width="2"/>
        <text x="105" y="205" font-family="ui-monospace" font-size="9.5" fill="#e0b84a">these 5 holes are one node</text>
      </svg>`,
    explain: `
      <p>Flip a breadboard over (mentally) and you'd see metal strips instead of a grid. There are three kinds of strips:</p>
      <ul>
        <li>The two outer rows are <strong>power rails</strong> — one usually marked <code>+</code>, one marked <code>-</code>. Every hole along a rail is connected in one long line, left to right.</li>
        <li>The main body is split into <strong>terminal strips</strong> — short columns of 5 holes. All 5 holes in a column are electrically the same point.</li>
        <li>A <strong>center gap</strong> splits the board in half, so a chip straddling it doesn't short its own legs together.</li>
      </ul>
      <p>Plugging a wire into any hole in a column is the same as plugging it into any other hole in that column. That's the whole trick — once it clicks, every circuit diagram gets much easier to read.</p>
    `,
    code:null,
    quiz:{
      q:"If you plug an LED leg into row 4 of a column, which other row is it electrically connected to?",
      opts:["Row 3 or 5 in the same column","The matching row in every column","The power rail","Nothing — each hole is separate"],
      correct:0,
      fb:["Right — all 5 holes in one column are the same node.","Not quite — connection is per column, not across the whole row of the board.","Not quite — the power rail is a separate strip that runs the full length of the board.","Not quite — holes in the same column ARE connected under the plastic."]
    }
  },
  {
    id:"led",
    label:"Blinking an LED",
    eyebrow:"Digital output",
    title:"pinMode, digitalWrite, and your first blink",
    lede:"This is the 'hello world' of electronics: tell a pin to be an output, then flip it on and off. It's also the project you already have wired up.",
    diagram: () => `
      <svg viewBox="0 0 560 210" width="540" height="210" role="img" aria-label="LED circuit diagram">
        <rect x="10" y="10" width="120" height="190" rx="6" fill="#0f3b2b" stroke="#1c5b41"/>
        <text x="70" y="30" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#a9b8ae">Uno</text>
        <rect x="30" y="90" width="80" height="26" rx="3" fill="#123a2b" stroke="#e0b84a"/>
        <text x="70" y="107" text-anchor="middle" font-family="ui-monospace" font-size="11" fill="#e0b84a">PIN 13</text>
        <rect x="30" y="150" width="80" height="26" rx="3" fill="#123a2b" stroke="#7f9ad8"/>
        <text x="70" y="167" text-anchor="middle" font-family="ui-monospace" font-size="11" fill="#7f9ad8">GND</text>

        <line x1="110" y1="103" x2="230" y2="103" stroke="#c17a3d" stroke-width="2"/>
        <!-- resistor -->
        <polyline points="230,103 238,95 246,111 254,95 262,111 270,95 278,103" fill="none" stroke="#e0b84a" stroke-width="2"/>
        <text x="254" y="80" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#e0b84a">220 ohm</text>
        <line x1="278" y1="103" x2="330" y2="103" stroke="#c17a3d" stroke-width="2"/>

        <!-- LED -->
        <line x1="330" y1="103" x2="330" y2="150" stroke="#c17a3d" stroke-width="2"/>
        <polygon points="315,150 345,150 330,175" fill="#123a2b" stroke="#d16b5a" stroke-width="1.8"/>
        <line x1="315" y1="175" x2="345" y2="175" stroke="#d16b5a" stroke-width="2.5"/>
        <text x="330" y="196" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#d16b5a">LED</text>
        <line x1="330" y1="175" x2="330" y2="150" stroke="#c17a3d" stroke-width="2"/>

        <line x1="330" y1="150" x2="330" y2="163" stroke="#7f9ad8" stroke-width="2"/>
        <line x1="110" y1="163" x2="330" y2="163" stroke="#7f9ad8" stroke-width="2"/>
      </svg>`,
    explain: `
      <p>Current has to leave the Arduino, pass through something, and come back to <code>GND</code> — a full loop, always. For an LED that loop is: <code>PIN 13 → resistor → LED → GND</code>.</p>
      <p>The resistor isn't optional decoration — an LED offers almost no resistance on its own, so without one it pulls too much current and burns out almost instantly. 220&ndash;330 ohms is the usual safe range for a 5V pin.</p>
      <p>LEDs are also directional: the longer leg (anode) faces the resistor/pin side, the shorter leg (cathode) faces ground. Backwards, it just won't light — it won't damage anything at these voltages.</p>
    `,
    code:{
      lang:"arduino",
      html:`<span class="tok-kw">const int</span> <span class="tok-fn">LED_PIN</span> = <span class="tok-num">13</span>;

<span class="tok-kw">void</span> <span class="tok-fn">setup</span>() {
  <span class="tok-fn">pinMode</span>(LED_PIN, <span class="tok-kw">OUTPUT</span>); <span class="tok-cm">// pin 13 will drive the LED</span>
}

<span class="tok-kw">void</span> <span class="tok-fn">loop</span>() {
  <span class="tok-fn">digitalWrite</span>(LED_PIN, <span class="tok-kw">HIGH</span>); <span class="tok-cm">// turn on</span>
  <span class="tok-fn">delay</span>(<span class="tok-num">500</span>);                  <span class="tok-cm">// wait 0.5s</span>
  <span class="tok-fn">digitalWrite</span>(LED_PIN, <span class="tok-kw">LOW</span>);  <span class="tok-cm">// turn off</span>
  <span class="tok-fn">delay</span>(<span class="tok-num">500</span>);
}`
    },
    quiz:{
      q:"What happens if you remove the resistor and wire the LED directly to pin 13?",
      opts:["The LED runs cooler","Nothing changes","Too much current flows and the LED (or pin) can burn out","The LED blinks faster"],
      correct:2,
      fb:["Not quite — no resistor means less resistance, not more cooling.","Not quite — the current isn't limited anymore, which does matter.","Right — the resistor limits current; without it, the LED draws far more than it's rated for.","Not quite — blink speed is set by delay(), unrelated to the resistor."]
    }
  },
  {
    id:"button",
    label:"Reading a button",
    eyebrow:"Digital input",
    title:"digitalRead and the INPUT_PULLUP trick",
    lede:"A button is just a switch — but a switch left 'floating' when it's open gives you random noise instead of a clean signal. INPUT_PULLUP fixes that with one line.",
    diagram: () => `
      <svg viewBox="0 0 560 210" width="540" height="210" role="img" aria-label="Pushbutton circuit diagram">
        <rect x="10" y="10" width="120" height="190" rx="6" fill="#0f3b2b" stroke="#1c5b41"/>
        <text x="70" y="30" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#a9b8ae">Uno</text>
        <rect x="30" y="90" width="80" height="26" rx="3" fill="#123a2b" stroke="#e0b84a"/>
        <text x="70" y="107" text-anchor="middle" font-family="ui-monospace" font-size="11" fill="#e0b84a">PIN 2</text>
        <rect x="30" y="150" width="80" height="26" rx="3" fill="#123a2b" stroke="#7f9ad8"/>
        <text x="70" y="167" text-anchor="middle" font-family="ui-monospace" font-size="11" fill="#7f9ad8">GND</text>

        <line x1="110" y1="103" x2="260" y2="103" stroke="#c17a3d" stroke-width="2"/>
        <!-- button -->
        <rect x="260" y="130" width="70" height="46" rx="4" fill="#123a2b" stroke="#cfe8d8" stroke-width="1.6"/>
        <line x1="275" y1="130" x2="275" y2="112" stroke="#c17a3d" stroke-width="2"/>
        <line x1="315" y1="130" x2="315" y2="112" stroke="#7f9ad8" stroke-width="2"/>
        <line x1="275" y1="112" x2="315" y2="112" stroke="#cfe8d8" stroke-width="2"/>
        <line x1="275" y1="112" x2="275" y2="103" stroke="#c17a3d" stroke-width="2"/>
        <line x1="275" y1="103" x2="260" y2="103" stroke="#c17a3d" stroke-width="2"/>
        <text x="295" y="196" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#cfe8d8">button</text>

        <line x1="315" y1="112" x2="315" y2="163" stroke="#7f9ad8" stroke-width="2"/>
        <line x1="110" y1="163" x2="315" y2="163" stroke="#7f9ad8" stroke-width="2"/>

        <text x="410" y="103" font-family="ui-monospace" font-size="9.5" fill="#a9b8ae">pin reads HIGH</text>
        <text x="410" y="118" font-family="ui-monospace" font-size="9.5" fill="#a9b8ae">until pressed,</text>
        <text x="410" y="133" font-family="ui-monospace" font-size="9.5" fill="#a9b8ae">then reads LOW</text>
      </svg>`,
    explain: `
      <p>Wiring it this way, one side of the button goes to <code>GND</code>, the other to the input pin — that's it. No resistor on the board this time.</p>
      <p><code>INPUT_PULLUP</code> switches on a resistor built into the chip itself, quietly holding the pin at <code>HIGH</code> (5V) whenever the button isn't pressed. Press the button and it connects the pin straight to ground, pulling it to <code>LOW</code>.</p>
      <p>That means the logic reads backwards from what feels natural: <code>LOW</code> = pressed, <code>HIGH</code> = not pressed. Trips up almost everyone the first time.</p>
    `,
    code:{
      lang:"arduino",
      html:`<span class="tok-kw">const int</span> <span class="tok-fn">BUTTON_PIN</span> = <span class="tok-num">2</span>;

<span class="tok-kw">void</span> <span class="tok-fn">setup</span>() {
  <span class="tok-fn">pinMode</span>(BUTTON_PIN, <span class="tok-kw">INPUT_PULLUP</span>);
  <span class="tok-fn">Serial</span>.<span class="tok-fn">begin</span>(<span class="tok-num">9600</span>);
}

<span class="tok-kw">void</span> <span class="tok-fn">loop</span>() {
  <span class="tok-kw">int</span> state = <span class="tok-fn">digitalRead</span>(BUTTON_PIN);
  <span class="tok-kw">if</span> (state == <span class="tok-kw">LOW</span>) {
    <span class="tok-fn">Serial</span>.<span class="tok-fn">println</span>(<span class="tok-str">"pressed"</span>);
  }
}`
    },
    quiz:{
      q:"With INPUT_PULLUP, what does digitalRead() return when the button is NOT pressed?",
      opts:["LOW","HIGH","0 volts","It depends on the resistor color"],
      correct:1,
      fb:["Not quite — LOW is the pressed state here.","Right — the internal pullup holds it HIGH until the button connects it to ground.","Not quite — 0V corresponds to LOW, which is the pressed state.","There's no external resistor in this circuit at all."]
    }
  },
  {
    id:"ldr",
    label:"Reading a light sensor",
    eyebrow:"Analog input",
    title:"analogRead and the voltage divider",
    lede:"An LDR (light-dependent resistor) changes resistance with light — but resistance alone can't be measured by a pin. You need a voltage divider to turn it into a voltage the Arduino can read.",
    diagram: () => `
      <svg viewBox="0 0 560 220" width="540" height="220" role="img" aria-label="LDR voltage divider circuit diagram">
        <rect x="10" y="10" width="120" height="200" rx="6" fill="#0f3b2b" stroke="#1c5b41"/>
        <text x="70" y="30" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#a9b8ae">Uno</text>
        <rect x="30" y="60" width="80" height="26" rx="3" fill="#123a2b" stroke="#d16b5a"/>
        <text x="70" y="77" text-anchor="middle" font-family="ui-monospace" font-size="11" fill="#d16b5a">5V</text>
        <rect x="30" y="100" width="80" height="26" rx="3" fill="#123a2b" stroke="#e0b84a"/>
        <text x="70" y="117" text-anchor="middle" font-family="ui-monospace" font-size="11" fill="#e0b84a">A0</text>
        <rect x="30" y="160" width="80" height="26" rx="3" fill="#123a2b" stroke="#7f9ad8"/>
        <text x="70" y="177" text-anchor="middle" font-family="ui-monospace" font-size="11" fill="#7f9ad8">GND</text>

        <line x1="110" y1="73" x2="300" y2="73" stroke="#c17a3d" stroke-width="2"/>
        <line x1="300" y1="73" x2="300" y2="113" stroke="#c17a3d" stroke-width="2"/>
        <!-- LDR symbol: resistor with arrows -->
        <polyline points="290,113 296,105 302,121 308,105 314,113" fill="none" stroke="#e0b84a" stroke-width="2"/>
        <text x="345" y="103" font-family="ui-monospace" font-size="10" fill="#e0b84a">LDR</text>

        <line x1="300" y1="121" x2="300" y2="140" stroke="#c17a3d" stroke-width="2"/>
        <circle cx="300" cy="140" r="4" fill="#e0b84a"/>
        <text x="345" y="144" font-family="ui-monospace" font-size="9.5" fill="#a9b8ae">tap point → A0</text>
        <line x1="300" y1="140" x2="110" y2="113" stroke="#e0b84a" stroke-width="1.6" stroke-dasharray="4 3"/>

        <line x1="300" y1="140" x2="300" y2="163" stroke="#c17a3d" stroke-width="2"/>
        <!-- fixed resistor -->
        <polyline points="290,163 296,155 302,171 308,155 314,163" fill="none" stroke="#cfe8d8" stroke-width="2"/>
        <text x="345" y="167" font-family="ui-monospace" font-size="10" fill="#cfe8d8">10k ohm</text>
        <line x1="300" y1="171" x2="300" y2="180" stroke="#7f9ad8" stroke-width="2"/>
        <line x1="110" y1="180" x2="300" y2="180" stroke="#7f9ad8" stroke-width="2"/>
      </svg>`,
    explain: `
      <p>Stack the LDR and a fixed 10k resistor in series between 5V and GND, and read the voltage at the point where they meet — that midpoint is your voltage divider.</p>
      <p>More light hits the LDR &rarr; its resistance drops &rarr; more of the 5V shows up at the tap point &rarr; <code>analogRead()</code> reports a higher number. In the dark, the opposite happens.</p>
      <p><code>analogRead()</code> returns a value from <code>0</code> to <code>1023</code>, mapping 0V to 5V across that range. It's the same trick used for potentiometers and most other analog sensors — measure a voltage, not a resistance directly.</p>
    `,
    code:{
      lang:"arduino",
      html:`<span class="tok-kw">const int</span> <span class="tok-fn">LDR_PIN</span> = <span class="tok-kw">A0</span>;

<span class="tok-kw">void</span> <span class="tok-fn">setup</span>() {
  <span class="tok-fn">Serial</span>.<span class="tok-fn">begin</span>(<span class="tok-num">9600</span>);
}

<span class="tok-kw">void</span> <span class="tok-fn">loop</span>() {
  <span class="tok-kw">int</span> light = <span class="tok-fn">analogRead</span>(LDR_PIN); <span class="tok-cm">// 0-1023</span>
  <span class="tok-fn">Serial</span>.<span class="tok-fn">println</span>(light);
  <span class="tok-fn">delay</span>(<span class="tok-num">200</span>);
}`
    },
    quiz:{
      q:"A room gets darker. What happens to the LDR's resistance, and to the analogRead() value at the tap point?",
      opts:["Resistance drops, analogRead value rises","Resistance rises, analogRead value drops","Resistance rises, analogRead value rises","Neither changes — LDRs only respond to temperature"],
      correct:1,
      fb:["Not quite — that's what happens when it gets BRIGHTER, not darker.","Right — darker means higher LDR resistance, so less of the 5V reaches the tap point, and analogRead() reads lower.","Resistance rising is correct, but that means LESS voltage reaches the tap point, not more.","LDRs are light-dependent resistors — they respond directly to light level."]
    }
  },
  {
    id:"sequence",
    label:"LED chase sequence",
    eyebrow:"Loops and arrays",
    title:"Driving several LEDs with a for loop",
    lede:"Once you're comfortable with one LED, the next step isn't more wiring know-how — it's using arrays and loops so your code scales instead of repeating itself six times.",
    diagram: () => `
      <svg viewBox="0 0 560 150" width="540" height="150" role="img" aria-label="Multiple LEDs on a chase sequence">
        <rect x="10" y="10" width="80" height="120" rx="6" fill="#0f3b2b" stroke="#1c5b41"/>
        <text x="50" y="30" text-anchor="middle" font-family="ui-monospace" font-size="9.5" fill="#a9b8ae">Uno</text>
        ${[2,3,4,5,6,7].map((p,i)=>`<text x="50" y="${48+i*13}" text-anchor="middle" font-family="ui-monospace" font-size="9" fill="#e0b84a">D${p}</text>`).join("")}
        ${[0,1,2,3,4,5].map((i)=>{
          const x = 150 + i*70;
          const on = i===2;
          return `
            <line x1="90" y1="${54+i*13}" x2="${x}" y2="${54+i*13}" stroke="#c17a3d" stroke-width="1.6"/>
            <line x1="${x}" y1="${54+i*13}" x2="${x}" y2="90" stroke="#c17a3d" stroke-width="1.6"/>
            <polygon points="${x-14},90 ${x+14},90 ${x},112" fill="${on?'#e0b84a':'#123a2b'}" stroke="${on?'#e0b84a':'#d16b5a'}" stroke-width="1.6"/>
            <line x1="${x-14}" y1="112" x2="${x+14}" y2="112" stroke="${on?'#e0b84a':'#d16b5a'}" stroke-width="2.2"/>
            <line x1="${x}" y1="112" x2="${x}" y2="128" stroke="#7f9ad8" stroke-width="1.6"/>
          `;
        }).join("")}
        <line x1="150" y1="128" x2="500" y2="128" stroke="#7f9ad8" stroke-width="1.6"/>
      </svg>`,
    explain: `
      <p>Wire six LEDs (each with its own resistor) to six digital pins, then instead of writing six near-identical blocks of <code>digitalWrite</code> calls, store the pin numbers in an array and loop over it.</p>
      <p>This is the same pattern used for anything repetitive on an Arduino — a strip of LEDs, a set of sensors, a run of relays. Learning it here on 6 LEDs is what makes 30-LED or 100-sensor projects manageable later.</p>
    `,
    code:{
      lang:"arduino",
      html:`<span class="tok-kw">const int</span> <span class="tok-fn">ledPins</span>[] = {<span class="tok-num">2</span>, <span class="tok-num">3</span>, <span class="tok-num">4</span>, <span class="tok-num">5</span>, <span class="tok-num">6</span>, <span class="tok-num">7</span>};
<span class="tok-kw">const int</span> <span class="tok-fn">NUM_LEDS</span> = <span class="tok-num">6</span>;

<span class="tok-kw">void</span> <span class="tok-fn">setup</span>() {
  <span class="tok-kw">for</span> (<span class="tok-kw">int</span> i = <span class="tok-num">0</span>; i < NUM_LEDS; i++) {
    <span class="tok-fn">pinMode</span>(ledPins[i], <span class="tok-kw">OUTPUT</span>);
  }
}

<span class="tok-kw">void</span> <span class="tok-fn">loop</span>() {
  <span class="tok-kw">for</span> (<span class="tok-kw">int</span> i = <span class="tok-num">0</span>; i < NUM_LEDS; i++) {
    <span class="tok-fn">digitalWrite</span>(ledPins[i], <span class="tok-kw">HIGH</span>);
    <span class="tok-fn">delay</span>(<span class="tok-num">100</span>);
    <span class="tok-fn">digitalWrite</span>(ledPins[i], <span class="tok-kw">LOW</span>);
  }
}`
    },
    quiz:{
      q:"Why use an array + for loop here instead of six separate digitalWrite blocks?",
      opts:["It runs the LEDs at a higher voltage","It's required by the Arduino compiler","It makes adding a 7th LED a one-line change instead of copying a whole block","for loops are faster at the hardware level"],
      correct:2,
      fb:["Not quite — voltage isn't affected by how the code is structured.","Not quite — plenty of valid Arduino sketches don't use loops at all.","Right — you'd just extend the array and bump NUM_LEDS, not duplicate code.","Not quite — the speed difference here is negligible; the real win is maintainability."]
    }
  }
];

/* ---------------- component glossary ---------------- */
const glossary = [
  {name:"Resistor", desc:"Limits current flow. Color bands encode the value in ohms."},
  {name:"LED", desc:"Lights up when current flows the right direction. Longer leg is positive."},
  {name:"Pushbutton", desc:"A momentary switch — connected only while pressed."},
  {name:"LDR", desc:"Photoresistor. Resistance drops as light increases."},
  {name:"Breadboard", desc:"Solderless prototyping board — holes in a column are pre-wired together."},
  {name:"Potentiometer", desc:"A variable resistor you turn by hand — a manual voltage divider."}
];

/* ---------------- state ---------------- */
let currentId = lessons[0].id;
let progress = {}; // id -> true once quiz answered correctly (or lesson viewed w/o quiz)
let quizAnswered = {};

function pct(){
  const total = lessons.length;
  const done = Object.values(progress).filter(Boolean).length;
  return Math.round((done/total)*100);
}

function renderHeader(){
  const row = document.getElementById("ledRow");
  row.innerHTML = lessons.map((l,i)=>`
    <div class="led-row">
      <div class="led ${progress[l.id] ? 'on':''}"></div>
      <div class="led-label">${i+1}</div>
    </div>
  `).join("");
  document.getElementById("railFill").style.width = pct()+"%";
}

function renderNav(){
  const nav = document.getElementById("navSocket");
  nav.innerHTML = `<div class="group-label">Lessons</div>` +
    lessons.map(l=>`
      <button class="nav-item ${l.id===currentId?'active':''} ${progress[l.id]?'done':''}" data-id="${l.id}">
        <span class="nav-pin"></span>${l.label}
      </button>
    `).join("") +
    `<div class="group-label" style="margin-top:6px;">Reference</div>
     <button class="nav-item ${currentId==='glossary'?'active':''}" data-id="glossary">
       <span class="nav-pin"></span>Component glossary
     </button>`;
  nav.querySelectorAll(".nav-item").forEach(btn=>{
    btn.addEventListener("click", ()=>{ currentId = btn.dataset.id; render(); window.scrollTo({top:0,behavior:"smooth"}); });
  });
}

function renderLesson(l){
  const idx = lessons.findIndex(x=>x.id===l.id);
  const board = document.getElementById("board");
  board.innerHTML = `
    <p class="eyebrow">${l.eyebrow} &middot; ${idx+1} of ${lessons.length}</p>
    <h2 class="title">${l.title}</h2>
    <p class="lede">${l.lede}</p>

    <section class="block">
      <h3>What's going on</h3>
      <div>${l.explain}</div>
    </section>

    <section class="block">
      <h3>Wiring</h3>
      <div class="diagram-frame">${l.diagram()}</div>
    </section>

    ${l.code ? `
    <section class="block">
      <h3>Code</h3>
      <div class="codebox">
        <div class="cb-head"><span>sketch.ino</span><span>${l.code.lang}</span></div>
        <pre>${l.code.html}</pre>
      </div>
    </section>` : ""}

    <section class="block">
      <h3>Quick check</h3>
      <div class="quiz" id="quizBox">
        <p class="q">${l.quiz.q}</p>
        <div class="quiz-opts">
          ${l.quiz.opts.map((o,i)=>`<button class="quiz-opt" data-i="${i}">${o}</button>`).join("")}
        </div>
        <p class="quiz-fb" id="quizFb"></p>
      </div>
    </section>

    <div class="nav-buttons">
      <button class="btn" id="prevBtn" ${idx===0?"disabled":""}>&larr; previous</button>
      <button class="btn primary" id="nextBtn" ${idx===lessons.length-1?"disabled":""}>next lesson &rarr;</button>
    </div>
  `;

  const quizBox = document.getElementById("quizBox");
  const fb = document.getElementById("quizFb");
  if (quizAnswered[l.id] !== undefined){
    const chosen = quizAnswered[l.id];
    quizBox.querySelectorAll(".quiz-opt").forEach((btn,i)=>{
      if (i===l.quiz.correct) btn.classList.add("correct");
      else if (i===chosen) btn.classList.add("wrong");
    });
    fb.textContent = l.quiz.fb[chosen];
  }
  quizBox.querySelectorAll(".quiz-opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const i = parseInt(btn.dataset.i,10);
      quizAnswered[l.id] = i;
      quizBox.querySelectorAll(".quiz-opt").forEach(b=>b.classList.remove("correct","wrong"));
      if (i===l.quiz.correct){
        btn.classList.add("correct");
        progress[l.id] = true;
      } else {
        btn.classList.add("wrong");
        quizBox.querySelectorAll(".quiz-opt")[l.quiz.correct].classList.add("correct");
      }
      fb.textContent = l.quiz.fb[i];
      renderHeader();
      renderNav();
    });
  });

  document.getElementById("prevBtn")?.addEventListener("click", ()=>{
    if (idx>0){ currentId = lessons[idx-1].id; render(); window.scrollTo({top:0,behavior:"smooth"}); }
  });
  document.getElementById("nextBtn")?.addEventListener("click", ()=>{
    if (idx<lessons.length-1){ currentId = lessons[idx+1].id; render(); window.scrollTo({top:0,behavior:"smooth"}); }
  });
}

function renderGlossary(){
  const board = document.getElementById("board");
  board.innerHTML = `
    <p class="eyebrow">Reference</p>
    <h2 class="title">Component glossary</h2>
    <p class="lede">Tap a part to see what it does. Handy for double-checking a wiring diagram against the parts on your bench.</p>
    <section class="block">
      <div class="glossary-grid" id="glossGrid"></div>
    </section>
  `;
  const grid = document.getElementById("glossGrid");
  grid.innerHTML = glossary.map(c=>`
    <div class="comp-card" data-name="${c.name}">
      <svg width="34" height="34" viewBox="0 0 34 34">
        <circle cx="17" cy="17" r="15" fill="#123a2b" stroke="#c17a3d" stroke-width="1.4"/>
      </svg>
      <div class="cc-name">${c.name}</div>
      <div class="cc-desc">${c.desc}</div>
    </div>
  `).join("");
  grid.querySelectorAll(".comp-card").forEach(card=>{
    card.addEventListener("click", ()=> card.classList.toggle("open"));
  });
}

function render(){
  renderHeader();
  renderNav();
  if (currentId === "glossary"){
    renderGlossary();
  } else {
    const l = lessons.find(x=>x.id===currentId);
    renderLesson(l);
  }
}

render();
</script>
</body>
</html>
